<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="exo17.css">
</head>
<body>
    <img id="image_principale" src="pokemonnoir2etblanc2.png" alt="image de pokémon noir et blanc 2">
        <h1>Bienvenu sur Pokémon Noir et Blanc 2 !</h1>
    <nav>
            <li>Accueil</li>
            <li class="blog">Blog</li>
            <li>Galerie</li>
            <li>Contact</li>
            <br>
    </nav>
    <div>
        <fieldset>
    <legend>Contact</legend>
    <form method="post" action="#"></form>
    <label for="nom">Nom : <span>*</span> </label>
    <input type="text" id="nom" placeholder="Ex : Robert" maxlength="20" minlength="2" required>
    <br>
    <form method="post" action="#"></form>
    <label for="email">E-mail : <span>*</span> </label>
    <input type="text" id="prenom" placeholder="Ex : monMail@FAI.com" required>
    <br>
    <form method="post" action="#"></form>
    <label for="commentaire">Laissez un commentaire : </label><br>
    <textarea type="text" id="commentaire" placeholder="Je dépose mon avis :)" rows="10" cols="70"></textarea>
    <br>
    <form method="post" action="#"></form>
    <input type="checkbox" id="copie" checked>
    <label for="copie">Envoyer un copie par E-mail !</label>
    <br>
    <form method="post" action="#"></form>
    <button type="checkbox" id="envoyer">
    <label for="envoyer">Envoyer</label>
    <br>
    <form method="post" action="#"></form>
    <button type="checkbox" id="reset">
    <label for="reset">Reset</label>
    </fieldset>
    </div>
    <div>
        <nav id="menu">
            <li>Menu 1</li>
            <li>Menu 2</li>
            <li>Menu 3</li>
            <li>Menu 4</li>
    </nav>
</div>
</div>
</body>
</html>

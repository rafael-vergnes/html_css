<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="exo15.css">
</head>
<body>
    <fieldset>
    <legend>Info personnelles</legend>
    <form method="post" action="#"></form>
    <label for="prenom">Prénom : </label>
    <input type="text" id="prenom" placeholder="Ex : Jacques" maxlength="20" minlength="2">
    <br>
    <form method="post" action="#"></form>
    <label for="nom">Nom : </label>
    <input type="text" id="nom" placeholder="Ex : Dubois" maxlength="20" minlength="2">
    <br>
    <form method="post" action="#"></form>
    <label for="email">E-mail : </label>
    <input type="text" id="prenom" placeholder="Ex : monMail@FAI.com">
    <br>
    <form method="post" action="#"></form>
    <label for="numero">Numéro : </label>
    <input type="text" id="numero" placeholder="Ex : 00.11.22.33.44">
    <br>
    <form method="post" action="#"></form>
    <label for="motdepasse">Mot de passe : </label>
    <input type="text" id="prenom" placeholder="Ex : P@sswo4d" maxlength="30" minlength="8">
    <br>
    <form method="post" action="#"></form>
    <label for="age">Âge : </label>
    <input type="text" id="numero" placeholder="Ex : 15">
    <br>
    <form method="post" action="#"></form>
    <label for="commentaire">Laissez un commentaire : </label><br>
    <textarea type="text" id="commentaire" placeholder="J'adore ce que vous faites ! " rows="10" cols="70"></textarea>
    <br>
    <form method="post" action="#"></form>
    <label for="date_com">Date de mon commentaire : </label>
    <input type="date" id="date_com">
    <br>
    <form method="post" action="#"></form>
    <label for="photo">Ma photo : </label>
    <input type="file" id="photo" placeholder="Ex : Aucun fichier choisi">
    <br>
    </fieldset>
    <fieldset>
    <legend>Vous préférez : </legend>
    <form method="post" action="#"></form>
    <input type="checkbox" id="html" checked>
    <label for="html">Le HTML</label>
    <br>
    <form method="post" action="#"></form>
    <input type="checkbox" id="css">
    <label for="css">Le CSS</label>
    <br>
    <form method="post" action="#"></form>
    <input type="checkbox" id="javascript">
    <label for="javascript">Le JavaScript</label>
    <br>
    <form method="post" action="#"></form>
    <input type="checkbox" id="nerienfaire">
    <label for="nerienfaire">Ne rien faire</label>
    </fieldset>
    <fieldset>
    <legend>Vous vous levez : </legend>
    <form method="post" action="#"></form>
    <input type="radio" id="matin" checked>
    <label for="matin">Le matin</label>
    <br>
    <form method="post" action="#"></form>
    <input type="radio" id="midi">
    <label for="midi">Le midi</label>
    <br>
    <form method="post" action="#"></form>
    <input type="radio" id="soir">
    <label for="soir">Le soir</label>
    <br>
    <form method="post" action="#"></form>
    <input type="radio" id="retard">
    <label for="retard">En retard !</label>
    </fieldset>
    <fieldset>
        <label>Vous en avez assez ?</label>
    <select name="liste" id="encore?">
        <optgroup label="Team Pas encore">
        <option value="j_en_veux_plus" selected>J'en veux plus</option>
        <option value="c_est_super">C'est super !</option>
        </optgroup>
        <optgroup label="Team Oula">
        <option value="j_en_ai_marre">J'en ai marre</option>
        <option value="pitie">Pitié !</option>
        </optgroup>
    </select>
    <legend>Fin du formulaire</legend>
    <form method="post" action="#"></form>
    <button type="checkbox" id="envoyer">
    <label for="envoyer">Envoyer</label>
    <br>
    <form method="post" action="#"></form>
    <button type="checkbox" id="reset">
    <label for="reset">Reset</label>
    </fieldset>
</body>
</html>
